name: Render Videos

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Track filename (e.g. Blue_Monday.mp3). Leave empty for all tracks."
        required: false
        default: ""
      mode:
        description: "Pipeline mode"
        required: true
        type: choice
        options:
          - full
          - analyze
          - render
        default: "full"
      preview:
        description: "Render at 480p preview quality"
        required: false
        type: boolean
        default: true
      legacy:
        description: "Use legacy ffmpeg pipeline (no PyTorch)"
        required: false
        type: boolean
        default: true

env:
  R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET: ${{ secrets.R2_BUCKET || 'djseith' }}

jobs:
  enumerate:
    runs-on: ubuntu-latest
    outputs:
      tracks: ${{ steps.list.outputs.tracks }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install boto3
        run: pip install boto3

      - name: List tracks
        id: list
        run: |
          if [ -n "${{ inputs.track }}" ]; then
            echo "tracks=[\"${{ inputs.track }}\"]" >> "$GITHUB_OUTPUT"
          else
            python -c "
          import boto3, json, os
          from botocore.config import Config
          client = boto3.client('s3',
              endpoint_url=os.environ['R2_ENDPOINT'],
              aws_access_key_id=os.environ['R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['R2_SECRET_ACCESS_KEY'],
              config=Config(signature_version='s3v4'),
              region_name='auto')
          bucket = os.environ.get('R2_BUCKET', 'djseith')
          paginator = client.get_paginator('list_objects_v2')
          tracks = []
          for page in paginator.paginate(Bucket=bucket, Prefix='audio/source/'):
              for obj in page.get('Contents', []):
                  key = obj['Key']
                  filename = key.split('/')[-1]
                  if filename.endswith(('.mp3', '.wav', '.flac')):
                      tracks.append(filename)
          tracks.sort()
          print(f'Found {len(tracks)} tracks')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'tracks={json.dumps(tracks)}\n')
          "
          fi

  process:
    needs: enumerate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        track: ${{ fromJson(needs.enumerate.outputs.tracks) }}
      fail-fast: false
      max-parallel: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          pip install boto3 librosa numpy scipy scikit-learn Pillow
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Pull audio from R2
        run: |
          python -c "
          import boto3, os
          from botocore.config import Config
          client = boto3.client('s3',
              endpoint_url=os.environ['R2_ENDPOINT'],
              aws_access_key_id=os.environ['R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['R2_SECRET_ACCESS_KEY'],
              config=Config(signature_version='s3v4'),
              region_name='auto')
          bucket = os.environ.get('R2_BUCKET', 'djseith')

          track = '${{ matrix.track }}'
          key = f'audio/source/{track}'
          os.makedirs('audio/source', exist_ok=True)
          print(f'Pulling {key}')
          client.download_file(bucket, key, key)
          "

      - name: Check for existing analysis in R2
        id: check_analysis
        if: inputs.mode == 'render'
        run: |
          TRACK="${{ matrix.track }}"
          BASENAME="${TRACK%.*}"
          python -c "
          import boto3, os, sys
          from botocore.config import Config
          client = boto3.client('s3',
              endpoint_url=os.environ['R2_ENDPOINT'],
              aws_access_key_id=os.environ['R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['R2_SECRET_ACCESS_KEY'],
              config=Config(signature_version='s3v4'),
              region_name='auto')
          bucket = os.environ.get('R2_BUCKET', 'djseith')
          key = f'audio/analysis/${BASENAME}.json'
          try:
              client.head_object(Bucket=bucket, Key=key)
              print(f'Found existing analysis: {key}')
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('exists=true\n')
          except client.exceptions.ClientError:
              print(f'No existing analysis found for {key}')
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write('exists=false\n')
          "

      - name: Analyze audio
        id: analyze
        if: inputs.mode == 'full' || inputs.mode == 'analyze'
        run: |
          TRACK="${{ matrix.track }}"
          AUDIO="audio/source/${TRACK}"
          BASENAME="${TRACK%.*}"
          mkdir -p audio/analysis

          echo "Analyzing: ${TRACK}"
          python visuals/scripts/phrase_detect.py \
            "${AUDIO}" \
            --bar-snap \
            -o "audio/analysis/${BASENAME}.json"

          echo "analysis_path=audio/analysis/${BASENAME}.json" >> "$GITHUB_OUTPUT"

      - name: Upload analysis to R2
        if: inputs.mode == 'full' || inputs.mode == 'analyze'
        run: |
          TRACK="${{ matrix.track }}"
          BASENAME="${TRACK%.*}"
          python -c "
          import boto3, os
          from botocore.config import Config
          client = boto3.client('s3',
              endpoint_url=os.environ['R2_ENDPOINT'],
              aws_access_key_id=os.environ['R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['R2_SECRET_ACCESS_KEY'],
              config=Config(signature_version='s3v4'),
              region_name='auto')
          bucket = os.environ.get('R2_BUCKET', 'djseith')
          local = 'audio/analysis/${BASENAME}.json'
          key = f'audio/analysis/${BASENAME}.json'
          size_kb = os.path.getsize(local) / 1024
          print(f'Uploading {key} ({size_kb:.1f} KB)')
          client.upload_file(local, bucket, key)
          "

      - name: Pull analysis from R2
        if: inputs.mode == 'render'
        run: |
          TRACK="${{ matrix.track }}"
          BASENAME="${TRACK%.*}"
          mkdir -p audio/analysis
          python -c "
          import boto3, os
          from botocore.config import Config
          client = boto3.client('s3',
              endpoint_url=os.environ['R2_ENDPOINT'],
              aws_access_key_id=os.environ['R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['R2_SECRET_ACCESS_KEY'],
              config=Config(signature_version='s3v4'),
              region_name='auto')
          bucket = os.environ.get('R2_BUCKET', 'djseith')
          key = 'audio/analysis/${BASENAME}.json'
          local = f'audio/analysis/${BASENAME}.json'
          print(f'Pulling {key}')
          client.download_file(bucket, key, local)
          "

      - name: Pull project assets from R2
        if: inputs.mode == 'full' || inputs.mode == 'render'
        run: |
          python -c "
          import boto3, os
          from botocore.config import Config
          client = boto3.client('s3',
              endpoint_url=os.environ['R2_ENDPOINT'],
              aws_access_key_id=os.environ['R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['R2_SECRET_ACCESS_KEY'],
              config=Config(signature_version='s3v4'),
              region_name='auto')
          bucket = os.environ.get('R2_BUCKET', 'djseith')
          paginator = client.get_paginator('list_objects_v2')
          for page in paginator.paginate(Bucket=bucket, Prefix='projects/'):
              for obj in page.get('Contents', []):
                  key = obj['Key']
                  os.makedirs(os.path.dirname(key), exist_ok=True)
                  print(f'  Pulling {key}')
                  client.download_file(bucket, key, key)
          "

      - name: Render video
        if: inputs.mode == 'full' || inputs.mode == 'render'
        run: |
          TRACK="${{ matrix.track }}"
          AUDIO="audio/source/${TRACK}"
          BASENAME="${TRACK%.*}"
          OUTPUT="output/${BASENAME}.mp4"
          PHRASES="audio/analysis/${BASENAME}.json"
          mkdir -p output

          EXTRA_ARGS=""
          if [ "${{ inputs.preview }}" = "true" ]; then
            EXTRA_ARGS="${EXTRA_ARGS} --preview"
          fi
          if [ "${{ inputs.legacy }}" = "true" ]; then
            EXTRA_ARGS="${EXTRA_ARGS} --legacy"
          fi

          # Auto-discover stills
          STILLS=$(find projects/funeral_parade_of_roses/stills -name "*.png" 2>/dev/null | sort)
          if [ -n "$STILLS" ]; then
            EXTRA_ARGS="${EXTRA_ARGS} --stills ${STILLS}"
          fi

          # Use per-track analysis if available
          if [ -f "${PHRASES}" ]; then
            EXTRA_ARGS="${EXTRA_ARGS} --phrases ${PHRASES}"
          fi

          echo "Rendering: ${TRACK}"
          python visuals/scripts/generate_video.py \
            --audio "${AUDIO}" \
            --output "${OUTPUT}" \
            --crf 26 \
            ${EXTRA_ARGS}

      - name: Upload render artifact
        if: inputs.mode == 'full' || inputs.mode == 'render'
        uses: actions/upload-artifact@v4
        with:
          name: render-${{ matrix.track }}
          path: output/*.mp4
          retention-days: 7
          if-no-files-found: ignore

  collect:
    needs: process
    runs-on: ubuntu-latest
    if: always() && (inputs.mode == 'full' || inputs.mode == 'render')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install boto3
        run: pip install boto3

      - uses: actions/download-artifact@v4
        with:
          path: renders/
          pattern: render-*
          merge-multiple: true

      - name: Upload renders to R2
        run: |
          python -c "
          import boto3, os, glob
          from botocore.config import Config
          client = boto3.client('s3',
              endpoint_url=os.environ['R2_ENDPOINT'],
              aws_access_key_id=os.environ['R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['R2_SECRET_ACCESS_KEY'],
              config=Config(signature_version='s3v4'),
              region_name='auto')
          bucket = os.environ.get('R2_BUCKET', 'djseith')
          for mp4 in sorted(glob.glob('renders/**/*.mp4', recursive=True)):
              filename = os.path.basename(mp4)
              key = f'renders/{filename}'
              size_mb = os.path.getsize(mp4) / 1024 / 1024
              print(f'  Uploading {key} ({size_mb:.1f} MB)')
              client.upload_file(mp4, bucket, key)
          print('Done.')
          "

      - name: Summary
        run: |
          echo "## Render Results" >> $GITHUB_STEP_SUMMARY
          if [ -d renders ]; then
            count=$(find renders -name "*.mp4" | wc -l)
            echo "**${count} videos rendered**" >> $GITHUB_STEP_SUMMARY
            find renders -name "*.mp4" -exec ls -lh {} \; | while read line; do
              echo "- ${line}" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "No renders produced." >> $GITHUB_STEP_SUMMARY
          fi
