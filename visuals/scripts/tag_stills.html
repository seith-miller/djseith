<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Tag Stills — Light / Dark</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, sans-serif;
    background: #1a1a1a;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
    padding: 20px;
  }
  #progress { font-size: 14px; color: #888; margin-bottom: 10px; }
  #filename { font-size: 16px; margin-bottom: 10px; }
  #preview {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }
  #preview img {
    max-width: 90vw;
    max-height: 70vh;
    object-fit: contain;
    background: repeating-conic-gradient(#333 0% 25%, #222 0% 50%) 50% / 20px 20px;
  }
  #buttons {
    display: flex;
    gap: 20px;
    margin-top: 20px;
  }
  button {
    font-size: 24px;
    padding: 16px 48px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
  }
  #btn-dark {
    background: #222;
    color: #fff;
    border: 2px solid #555;
  }
  #btn-neutral {
    background: #666;
    color: #fff;
    border: 2px solid #888;
  }
  #btn-light {
    background: #f0f0f0;
    color: #111;
    border: 2px solid #ccc;
  }
  button:hover { opacity: 0.85; }
  #done {
    display: none;
    text-align: center;
  }
  #done h2 { margin-bottom: 20px; }
  #done pre {
    background: #111;
    padding: 20px;
    border-radius: 8px;
    text-align: left;
    max-height: 60vh;
    overflow: auto;
    font-size: 13px;
  }
  #done button {
    margin-top: 20px;
    font-size: 16px;
    padding: 10px 24px;
  }
  .key-hint { font-size: 12px; color: #666; margin-top: 4px; }
</style>
</head>
<body>

<div id="progress"></div>
<div id="filename"></div>
<div id="preview"><img id="img" src=""></div>
<div id="buttons">
  <div style="text-align:center">
    <button id="btn-dark" onclick="tag('dark')">DARK</button>
    <div class="key-hint">← arrow or D</div>
  </div>
  <div style="text-align:center">
    <button id="btn-neutral" onclick="tag('neutral')">NEUTRAL</button>
    <div class="key-hint">↓ arrow or N</div>
  </div>
  <div style="text-align:center">
    <button id="btn-light" onclick="tag('light')">LIGHT</button>
    <div class="key-hint">→ arrow or L</div>
  </div>
</div>

<div id="done">
  <h2>All done!</h2>
  <p>Copy the JSON below and save it, or click the button to download.</p>
  <pre id="output"></pre>
  <button onclick="download()">Download JSON</button>
</div>

<script>
const STILLS = [
  "border_symmetric_for_black.png",
  "border_symmetric_for_white.png",
  "chrysanthemum_photo_transparent.png",
  "eddie_big_hair.png",
  "eddie_grain.png",
  "kanji_chi.png",
  "kanji_chi_white.png",
  "kanji_funeral_parade_of_roses.png",
  "kanji_kodomo.png",
  "kanji_kodomo_white.png",
  "kanji_maboroshi.png",
  "kanji_maboroshi_white.png",
  "kanji_maigo.png",
  "kanji_maigo_white.png",
  "kanji_okami.png",
  "kanji_okami_white.png",
  "kanji_shofu.png",
  "kanji_shofu_white.png",
  "kanji_unmei.png",
  "kanji_unmei_white.png",
  "rose_black_on_white.png",
  "rose_white_on_black.png",
  "roset_black_on_white.png",
  "roset_white_on_black.png",
  "title_funeral_parade.png",
  "title_funeral_parade_white.png",
  "title_interzone_xv.png",
  "title_interzone_xv_white.png"
];

const STILLS_DIR = "../../projects/funeral_parade_of_roses/stills/";
const results = {};
let idx = 0;

function show() {
  if (idx >= STILLS.length) {
    document.getElementById('buttons').style.display = 'none';
    document.getElementById('preview').style.display = 'none';
    document.getElementById('filename').style.display = 'none';
    document.getElementById('progress').style.display = 'none';
    const done = document.getElementById('done');
    done.style.display = 'block';
    document.getElementById('output').textContent = JSON.stringify(results, null, 2);
    return;
  }
  const name = STILLS[idx];
  document.getElementById('progress').textContent = `${idx + 1} / ${STILLS.length}`;
  document.getElementById('filename').textContent = name;
  document.getElementById('img').src = STILLS_DIR + name;
}

function tag(value) {
  if (idx >= STILLS.length) return;
  results[STILLS[idx]] = value;
  idx++;
  show();
}

function download() {
  const blob = new Blob([JSON.stringify(results, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'stills_brightness_tags.json';
  a.click();
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft' || e.key === 'd' || e.key === 'D') tag('dark');
  if (e.key === 'ArrowDown' || e.key === 'n' || e.key === 'N') tag('neutral');
  if (e.key === 'ArrowRight' || e.key === 'l' || e.key === 'L') tag('light');
});

show();
</script>
</body>
</html>
